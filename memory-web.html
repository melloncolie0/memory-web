<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Memory Web</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; background: #0f0f11; font-family: Inter, system-ui, sans-serif; color: #e2e2e2; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    .chip { display:inline-flex; align-items:center; padding:5px 14px; border-radius:999px; font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; transition: background .15s, color .15s; border: 1px solid transparent; user-select:none; }
    .chip-all { background:#1e1e24; color:#aaa; border-color:#2a2a32; }
    .chip-all.active { background:#e2e2e2; color:#111; }
    .chip-add { background:#1e1e24; color:#aaa; border-color:#2a2a32; font-size:18px; padding:2px 12px; }
    .chip-add:hover { background:#2a2a32; }
    .sheet-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:40; display:flex; align-items:flex-end; }
    .sheet { background:#16161c; border-radius:18px 18px 0 0; padding:24px; width:100%; max-width:480px; margin:0 auto; }
    .sheet-handle { width:40px; height:4px; background:#333; border-radius:4px; margin:0 auto 20px; }
    .input { background:#1e1e24; border:1px solid #2a2a32; border-radius:10px; padding:10px 14px; color:#e2e2e2; font-size:14px; outline:none; width:100%; }
    .input:focus { border-color:#555; }
    .btn { padding:10px 18px; border-radius:10px; font-size:14px; font-weight:500; cursor:pointer; border:none; transition: opacity .15s; }
    .btn:active { opacity:.75; }
    .btn-primary { background:#e2e2e2; color:#111; }
    .btn-ghost { background:#1e1e24; color:#aaa; border:1px solid #2a2a32; }
    .btn-danger { background:#3d1a1a; color:#f87171; border:1px solid #5a2020; }
    .fab { position:absolute; bottom:24px; right:24px; width:52px; height:52px; border-radius:999px; background:#e2e2e2; color:#111; font-size:26px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 20px rgba(0,0,0,.4); border:none; transition: transform .1s; z-index:10; }
    .fab:active { transform: scale(.93); }
    .color-dot { width:22px; height:22px; border-radius:999px; cursor:pointer; border:2px solid transparent; transition: border-color .15s; }
    .color-dot.selected { border-color:#fff; }
    select.input { appearance:none; }
    .tag-badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:500; }
    canvas { display:block; touch-action:none; }
    .connect-hint { position:absolute; top:12px; left:50%; transform:translateX(-50%); background:rgba(30,30,36,.92); color:#aaa; font-size:12px; padding:6px 14px; border-radius:999px; pointer-events:none; z-index:5; border:1px solid #2a2a32; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect,useCallback,useMemo}=React;

const PRESET_COLORS=['#7c6af7','#f97316','#22c55e','#06b6d4','#f43f5e','#eab308'];

const INITIAL_CATEGORIES=[
  {id:'work',   label:'Работа',       color:'#7c6af7'},
  {id:'personal',label:'Личное',      color:'#f97316'},
  {id:'ideas',  label:'Идеи',         color:'#22c55e'},
  {id:'travel', label:'Путешествия',  color:'#06b6d4'},
];

const INITIAL_NODES=[
  {id:'n1', title:'Запустить проект',   text:'Финализировать дизайн и передать разработчикам к концу месяца.',  category:'work',     date:'2024-01-10'},
  {id:'n2', title:'Встреча с командой', text:'Обсудить спринт, распределить задачи по бэклогу.',                category:'work',     date:'2024-01-12'},
  {id:'n3', title:'Купить билеты',      text:'Найти рейсы в Токио на апрель. Сравнить цены на Aviasales.',      category:'travel',   date:'2024-01-14'},
  {id:'n4', title:'Приложение графов',  text:'Сделать интерактивный граф заметок как mind-map в dark mode.',    category:'ideas',    date:'2024-01-15'},
  {id:'n5', title:'Прочитать книгу',    text:'«Думай медленно, решай быстро» — Канеман. Осталось 80 страниц.', category:'personal', date:'2024-01-16'},
  {id:'n6', title:'Токио: маршрут',     text:'Синдзюку, Акихабара, Асакуса. Зарезервировать отель в Шибуе.',   category:'travel',   date:'2024-01-17'},
  {id:'n7', title:'Дизайн-система',     text:'Собрать токены цветов, типографику и компоненты в Figma.',        category:'work',     date:'2024-01-18'},
  {id:'n8', title:'Японский язык',      text:'Учить хирагану по 20 минут в день через Anki.',                   category:'personal', date:'2024-01-19'},
  {id:'n9', title:'Кемпинг летом',      text:'Найти место у озера. Взять палатку у Артёма.',                    category:'travel',   date:'2024-01-20'},
  {id:'n10',title:'AI и UX',            text:'Как искусственный интеллект меняет проектирование интерфейсов.',  category:'ideas',    date:'2024-01-21'},
];

const INITIAL_EDGES=[
  {id:'e1',source:'n1',target:'n2'},
  {id:'e2',source:'n1',target:'n7'},
  {id:'e3',source:'n3',target:'n6'},
  {id:'e4',source:'n3',target:'n8'},
  {id:'e5',source:'n4',target:'n10'},
  {id:'e6',source:'n4',target:'n7'},
  {id:'e7',source:'n5',target:'n8'},
  {id:'e8',source:'n6',target:'n9'},
  {id:'e9',source:'n2',target:'n10'},
];

const edgeKey=(a,b)=>[a,b].sort().join('--');

// Distance from point (px,py) to segment (ax,ay)-(bx,by)
function distToSegment(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay;
  const lenSq=dx*dx+dy*dy;
  if(lenSq===0)return Math.hypot(px-ax,py-ay);
  let t=((px-ax)*dx+(py-ay)*dy)/lenSq;
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}

function Chip({label,color,active,onClick}){
  const style=active
    ?{background:color,color:'#fff',borderColor:color}
    :{background:'#1e1e24',color:'#aaa',borderColor:'#2a2a32'};
  return<button className="chip" style={style} onClick={onClick}>{label}</button>;
}

function Graph({nodes,edges,categories,onNodeClick,onCreateEdge,onDeleteEdge}){
  const canvasRef=useRef(null);
  const stateRef=useRef({
    pan:{x:0,y:0},scale:1,
    dragging:null,
    panning:false,panStart:null,panOrigin:null,
    longPressTimer:null,longPressNode:null,
    connectMode:false,connectSource:null,
    previewLine:null,
    hoverNode:null,
    hoverEdge:null,
    positions:{},
    newEdgeAnim:null,newEdgeAnimStart:null,
    isPinching:false,pinchDist:null,pinchMidX:0,pinchMidY:0,
    pointerDownPos:null,pointerMoved:false,
  });
  const [tick,setTick]=useState(0);
  const repaint=useCallback(()=>setTick(t=>t+1),[]);

  const catMap=useMemo(()=>{const m={};categories.forEach(c=>m[c.id]=c);return m;},[categories]);

  const nodeRadius=useCallback((node)=>{
    const conns=edges.filter(e=>e.source===node.id||e.target===node.id).length;
    return 18+Math.min(conns,6)*2;
  },[edges]);

  useEffect(()=>{
    const st=stateRef.current;
    const canvas=canvasRef.current;
    if(!canvas)return;
    const W=canvas.width||canvas.offsetWidth;
    const H=canvas.height||canvas.offsetHeight;
    nodes.forEach((n,i)=>{
      if(!st.positions[n.id]){
        const angle=(i/nodes.length)*2*Math.PI;
        const r=Math.min(W,H)*0.35;
        st.positions[n.id]={
          x:W/2+r*Math.cos(angle),
          y:H/2+r*Math.sin(angle),
        };
      }
    });
  },[nodes]);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const resize=()=>{
      canvas.width=canvas.offsetWidth;
      canvas.height=canvas.offsetHeight;
      repaint();
    };
    resize();
    const ro=new ResizeObserver(resize);
    ro.observe(canvas);
    return()=>ro.disconnect();
  },[]);

  // Hit-test an edge — returns edge id or null
  const hitEdge=useCallback((wx,wy)=>{
    const st=stateRef.current;
    const HIT=8/st.scale; // hit area in world coords
    for(const edge of edges){
      const pa=st.positions[edge.source],pb=st.positions[edge.target];
      if(!pa||!pb)continue;
      const d=distToSegment(wx,wy,pa.x,pa.y,pb.x,pb.y);
      if(d<=HIT)return edge;
    }
    return null;
  },[edges]);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext('2d');
    const st=stateRef.current;
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    ctx.save();
    ctx.translate(st.pan.x,st.pan.y);
    ctx.scale(st.scale,st.scale);

    const posOf=id=>st.positions[id];

    let animProgress=1;
    if(st.newEdgeAnim&&st.newEdgeAnimStart){
      const elapsed=Date.now()-st.newEdgeAnimStart;
      animProgress=Math.min(elapsed/350,1);
      if(animProgress<1)setTimeout(repaint,16);
    }

    edges.forEach(edge=>{
      const pa=posOf(edge.source),pb=posOf(edge.target);
      if(!pa||!pb)return;
      const isNew=st.newEdgeAnim===edge.id;
      const isHovered=st.hoverEdge===edge.id;
      ctx.save();
      if(isHovered){
        // Glowing highlight for hovered edge
        ctx.strokeStyle='rgba(248,113,113,0.85)';
        ctx.lineWidth=2.5;
        ctx.shadowColor='rgba(248,113,113,0.4)';
        ctx.shadowBlur=8;
      } else {
        ctx.strokeStyle=isNew?`rgba(255,255,255,${0.15+0.55*animProgress})`:'rgba(255,255,255,0.12)';
        ctx.lineWidth=isNew?1+animProgress:1;
      }
      ctx.beginPath();
      ctx.moveTo(pa.x,pa.y);
      ctx.lineTo(pb.x,pb.y);
      ctx.stroke();
      ctx.restore();
    });

    if(st.connectMode&&st.connectSource&&st.previewLine){
      const src=posOf(st.connectSource);
      if(src){
        ctx.save();
        ctx.strokeStyle='rgba(255,255,255,0.55)';
        ctx.lineWidth=1.5;
        ctx.setLineDash([6,5]);
        ctx.shadowColor='rgba(255,255,255,0.25)';
        ctx.shadowBlur=6;
        ctx.beginPath();
        ctx.moveTo(src.x,src.y);
        ctx.lineTo(st.previewLine.x,st.previewLine.y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
    }

    nodes.forEach(node=>{
      const pos=posOf(node.id);
      if(!pos)return;
      const cat=catMap[node.category];
      const color=cat?cat.color:'#555';
      const r=nodeRadius(node)*st.scale;
      const isConnSrc=st.connectMode&&st.connectSource===node.id;
      const isHovered=st.hoverNode===node.id;

      if(isConnSrc){
        ctx.save();
        const pulse=0.5+0.5*Math.sin(Date.now()/180);
        ctx.strokeStyle=`rgba(255,255,255,${0.3+0.3*pulse})`;
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(pos.x,pos.y,r+5+3*pulse,0,Math.PI*2);
        ctx.stroke();
        ctx.restore();
        setTimeout(repaint,30);
      }

      if(isHovered&&!isConnSrc){
        ctx.save();
        ctx.strokeStyle='rgba(255,255,255,0.6)';
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.arc(pos.x,pos.y,r+4,0,Math.PI*2);
        ctx.stroke();
        ctx.restore();
      }

      ctx.save();
      ctx.fillStyle=color;
      ctx.beginPath();
      ctx.arc(pos.x,pos.y,r,0,Math.PI*2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.strokeStyle=isHovered?color:`${color}88`;
      ctx.lineWidth=isHovered?2:1.5;
      ctx.beginPath();
      ctx.arc(pos.x,pos.y,r,0,Math.PI*2);
      ctx.stroke();
      ctx.restore();

      ctx.save();
      ctx.fillStyle='rgba(255,255,255,0.88)';
      ctx.shadowColor='rgba(0,0,0,0.6)';
      ctx.shadowBlur=3;
      ctx.font='500 13px Inter,system-ui,sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      const maxW=r*1.7;
      let label=node.title||'';
      while(label.length>2&&ctx.measureText(label).width>maxW){
        label=label.slice(0,-1);
      }
      if(label.length<(node.title||'').length)label=label.trimEnd()+'…';
      ctx.fillText(label,pos.x,pos.y);
      ctx.restore();
    });

    ctx.restore();
  },[nodes,edges,catMap,nodeRadius,tick]);

  const toWorld=useCallback((cx,cy)=>{
    const st=stateRef.current;
    return{x:(cx-st.pan.x)/st.scale,y:(cy-st.pan.y)/st.scale};
  },[]);

  const hitNode=useCallback((wx,wy)=>{
    const st=stateRef.current;
    return nodes.find(n=>{
      const p=st.positions[n.id];
      if(!p)return false;
      const r=nodeRadius(n);
      return Math.hypot(wx-p.x,wy-p.y)<=r;
    });
  },[nodes,nodeRadius]);

  const cancelLongPress=useCallback(()=>{
    const st=stateRef.current;
    if(st.longPressTimer){clearTimeout(st.longPressTimer);st.longPressTimer=null;}
    st.longPressNode=null;
  },[]);

  // ── Touch handlers ──────────────────────────────────────────────────────
  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const st=stateRef.current;

    const getPinchInfo=(touches)=>{
      const t0=touches[0],t1=touches[1];
      const rect=canvas.getBoundingClientRect();
      const dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
      const midX=(t0.clientX+t1.clientX)/2-rect.left;
      const midY=(t0.clientY+t1.clientY)/2-rect.top;
      return{dist,midX,midY};
    };

    const onTouchStart=(e)=>{
      e.preventDefault();
      if(e.touches.length===2){
        cancelLongPress();
        st.dragging=null;st.panning=false;
        st.connectMode=false;st.connectSource=null;st.previewLine=null;st.hoverNode=null;st.hoverEdge=null;
        const{dist,midX,midY}=getPinchInfo(e.touches);
        st.isPinching=true;st.pinchDist=dist;st.pinchMidX=midX;st.pinchMidY=midY;
        repaint();return;
      }
      st.isPinching=false;st.pinchDist=null;
      const rect=canvas.getBoundingClientRect();
      const t=e.touches[0];
      const cx=t.clientX-rect.left,cy=t.clientY-rect.top;
      const{x:wx,y:wy}=toWorld(cx,cy);
      const node=hitNode(wx,wy);
      if(node){
        cancelLongPress();
        st.longPressNode=node.id;
        st.longPressTimer=setTimeout(()=>{
          st.connectMode=true;st.connectSource=node.id;st.dragging=null;repaint();
        },500);
        st.dragging={id:node.id,ox:wx-st.positions[node.id].x,oy:wy-st.positions[node.id].y};
        st.pointerDownPos={cx,cy};st.pointerMoved=false;
      } else {
        st.panning=true;st.panStart={cx,cy};st.panOrigin={...st.pan};
      }
    };

    const onTouchMove=(e)=>{
      e.preventDefault();
      if(e.touches.length===2){
        if(!st.isPinching){
          cancelLongPress();st.dragging=null;st.panning=false;
          const{dist,midX,midY}=getPinchInfo(e.touches);
          st.isPinching=true;st.pinchDist=dist;st.pinchMidX=midX;st.pinchMidY=midY;return;
        }
        const{dist,midX,midY}=getPinchInfo(e.touches);
        if(st.pinchDist!==null){
          const ratio=dist/st.pinchDist;
          const newScale=Math.max(0.3,Math.min(3,st.scale*ratio));
          st.pan={x:midX-(midX-st.pan.x)*(newScale/st.scale),y:midY-(midY-st.pan.y)*(newScale/st.scale)};
          st.scale=newScale;
          st.pan.x+=midX-st.pinchMidX;st.pan.y+=midY-st.pinchMidY;
        }
        st.pinchDist=dist;st.pinchMidX=midX;st.pinchMidY=midY;
        repaint();return;
      }
      if(st.isPinching)return;
      const rect=canvas.getBoundingClientRect();
      const t=e.touches[0];
      const cx=t.clientX-rect.left,cy=t.clientY-rect.top;
      const{x:wx,y:wy}=toWorld(cx,cy);
      if(st.pointerDownPos){
        const dx=Math.abs(cx-st.pointerDownPos.cx),dy=Math.abs(cy-st.pointerDownPos.cy);
        if(dx>5||dy>5)st.pointerMoved=true;
      }
      if(st.connectMode&&st.connectSource){
        cancelLongPress();
        st.previewLine={x:wx,y:wy};
        const hn=hitNode(wx,wy);st.hoverNode=hn?hn.id:null;
        repaint();return;
      }
      if(st.dragging&&st.pointerMoved){
        cancelLongPress();
        st.positions[st.dragging.id]={x:wx-st.dragging.ox,y:wy-st.dragging.oy};
        repaint();return;
      }
      if(st.panning&&st.panStart){
        st.pan={x:st.panOrigin.x+(cx-st.panStart.cx),y:st.panOrigin.y+(cy-st.panStart.cy)};
        repaint();
      }
    };

    const onTouchEnd=(e)=>{
      e.preventDefault();
      if(e.touches.length<2){
        if(st.isPinching){
          st.isPinching=false;st.pinchDist=null;
          st.dragging=null;st.panning=false;
          st.pointerDownPos=null;st.pointerMoved=false;return;
        }
      }
      if(st.isPinching)return;
      const movedSignificantly=st.pointerMoved;
      let wx=0,wy=0;
      if(e.changedTouches.length>0){
        const rect=canvas.getBoundingClientRect();
        const t=e.changedTouches[0];
        const cx=t.clientX-rect.left,cy=t.clientY-rect.top;
        const w=toWorld(cx,cy);wx=w.x;wy=w.y;
      }
      if(st.connectMode&&st.connectSource){
        const target=hitNode(wx,wy);
        if(target&&target.id!==st.connectSource)onCreateEdge(st.connectSource,target.id);
        st.connectMode=false;st.connectSource=null;st.previewLine=null;st.hoverNode=null;
        repaint();
      } else if(st.dragging&&!movedSignificantly){
        const node=nodes.find(n=>n.id===st.dragging.id);
        if(node){cancelLongPress();onNodeClick(node);}
      }
      cancelLongPress();
      st.dragging=null;st.panning=false;st.panStart=null;st.panOrigin=null;
      st.pointerDownPos=null;st.pointerMoved=false;
    };

    canvas.addEventListener('touchstart',onTouchStart,{passive:false});
    canvas.addEventListener('touchmove',onTouchMove,{passive:false});
    canvas.addEventListener('touchend',onTouchEnd,{passive:false});
    canvas.addEventListener('touchcancel',onTouchEnd,{passive:false});
    return()=>{
      canvas.removeEventListener('touchstart',onTouchStart);
      canvas.removeEventListener('touchmove',onTouchMove);
      canvas.removeEventListener('touchend',onTouchEnd);
      canvas.removeEventListener('touchcancel',onTouchEnd);
    };
  },[nodes,toWorld,hitNode,hitEdge,cancelLongPress,onNodeClick,onCreateEdge,onDeleteEdge,repaint]);

  // ── Mouse handlers ──────────────────────────────────────────────────────
  const onMouseDown=useCallback((e)=>{
    const st=stateRef.current;
    const canvas=canvasRef.current;
    const rect=canvas.getBoundingClientRect();
    const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
    const{x:wx,y:wy}=toWorld(cx,cy);
    const node=hitNode(wx,wy);
    if(node){
      cancelLongPress();
      st.longPressNode=node.id;
      st.longPressTimer=setTimeout(()=>{
        st.connectMode=true;st.connectSource=node.id;st.dragging=null;repaint();
      },500);
      st.dragging={id:node.id,ox:wx-st.positions[node.id].x,oy:wy-st.positions[node.id].y};
      st.pointerDownPos={cx,cy};st.pointerMoved=false;
    } else {
      st.panning=true;st.panStart={cx,cy};st.panOrigin={...st.pan};
      if(st.connectMode){
        st.connectMode=false;st.connectSource=null;st.previewLine=null;st.hoverNode=null;repaint();
      }
    }
  },[toWorld,hitNode,cancelLongPress,repaint]);

  const onMouseMove=useCallback((e)=>{
    const st=stateRef.current;
    const canvas=canvasRef.current;
    const rect=canvas.getBoundingClientRect();
    const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
    const{x:wx,y:wy}=toWorld(cx,cy);
    if(st.pointerDownPos){
      const dx=Math.abs(cx-st.pointerDownPos.cx),dy=Math.abs(cy-st.pointerDownPos.cy);
      if(dx>5||dy>5)st.pointerMoved=true;
    }
    if(st.connectMode&&st.connectSource){
      cancelLongPress();
      st.previewLine={x:wx,y:wy};
      const hn=hitNode(wx,wy);st.hoverNode=hn?hn.id:null;
      repaint();return;
    }
    if(st.dragging&&st.pointerMoved){
      cancelLongPress();
      st.positions[st.dragging.id]={x:wx-st.dragging.ox,y:wy-st.dragging.oy};
      st.hoverEdge=null;
      repaint();return;
    }
    if(st.panning&&st.panStart){
      st.pan={x:st.panOrigin.x+(cx-st.panStart.cx),y:st.panOrigin.y+(cy-st.panStart.cy)};
      repaint();return;
    }
    // Hover edge highlight when idle
    if(!st.dragging&&!st.panning&&!st.connectMode){
      const nodeUnder=hitNode(wx,wy);
      if(!nodeUnder){
        const edge=hitEdge(wx,wy);
        const newHover=edge?edge.id:null;
        if(newHover!==st.hoverEdge){st.hoverEdge=newHover;repaint();}
      } else if(st.hoverEdge){
        st.hoverEdge=null;repaint();
      }
    }
  },[toWorld,hitNode,hitEdge,cancelLongPress,repaint]);

  const onMouseUp=useCallback((e)=>{
    const st=stateRef.current;
    const canvas=canvasRef.current;
    const rect=canvas.getBoundingClientRect();
    const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
    const{x:wx,y:wy}=toWorld(cx,cy);
    const movedSignificantly=st.pointerMoved;
    if(st.connectMode&&st.connectSource){
      const target=hitNode(wx,wy);
      if(target&&target.id!==st.connectSource)onCreateEdge(st.connectSource,target.id);
      st.connectMode=false;st.connectSource=null;st.previewLine=null;st.hoverNode=null;
      repaint();
    } else if(st.dragging&&!movedSignificantly){
      const node=nodes.find(n=>n.id===st.dragging.id);
      if(node){cancelLongPress();onNodeClick(node);}
    } else if(!st.dragging&&!movedSignificantly&&!st.panning){
      // Click on empty canvas — check edge hit
      const edge=hitEdge(wx,wy);
      if(edge)onDeleteEdge(edge);
    }
    cancelLongPress();
    st.dragging=null;st.panning=false;st.panStart=null;st.panOrigin=null;
    st.pointerDownPos=null;st.pointerMoved=false;
  },[toWorld,hitNode,hitEdge,nodes,onNodeClick,onCreateEdge,onDeleteEdge,cancelLongPress,repaint]);

  const onWheel=useCallback((e)=>{
    e.preventDefault();
    const st=stateRef.current;
    const canvas=canvasRef.current;
    const rect=canvas.getBoundingClientRect();
    const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
    const delta=e.deltaY>0?0.9:1.1;
    const newScale=Math.max(0.3,Math.min(3,st.scale*delta));
    st.pan={x:cx-(cx-st.pan.x)*(newScale/st.scale),y:cy-(cy-st.pan.y)*(newScale/st.scale)};
    st.scale=newScale;
    repaint();
  },[repaint]);

  Graph.triggerEdgeAnim=(edgeId)=>{
    const st=stateRef.current;
    st.newEdgeAnim=edgeId;st.newEdgeAnimStart=Date.now();
  };

  return(
    <canvas
      ref={canvasRef}
      style={{width:'100%',height:'100%',display:'block',touchAction:'none'}}
      onMouseDown={onMouseDown}
      onMouseMove={onMouseMove}
      onMouseUp={onMouseUp}
      onMouseLeave={onMouseUp}
      onWheel={onWheel}
    />
  );
}

function App(){
  const [nodes,setNodes]=useState(INITIAL_NODES);
  const [edges,setEdges]=useState(INITIAL_EDGES);
  const [categories,setCategories]=useState(INITIAL_CATEGORIES);
  const [selectedCategories,setSelectedCategories]=useState(['all']);
  const [selectedNode,setSelectedNode]=useState(null);
  const [noteOpen,setNoteOpen]=useState(false);
  const [addCatOpen,setAddCatOpen]=useState(false);
  const [addNoteOpen,setAddNoteOpen]=useState(false);
  const [editOpen,setEditOpen]=useState(false);
  const [deleteEdgeTarget,setDeleteEdgeTarget]=useState(null);
  const [newCatName,setNewCatName]=useState('');
  const [newCatColor,setNewCatColor]=useState(PRESET_COLORS[0]);
  const [noteForm,setNoteForm]=useState({title:'',text:'',category:'work',date:''});
  const [editForm,setEditForm]=useState({title:'',text:'',category:'work',date:''});

  const toggleCategory=useCallback((id)=>{
    setSelectedCategories(prev=>{
      if(id==='all')return['all'];
      const base=prev.filter(x=>x!=='all');
      const exists=base.includes(id);
      const next=exists?base.filter(x=>x!==id):[...base,id];
      return next.length?next:['all'];
    });
    setNoteOpen(false);
  },[]);

  const visibleIds=useMemo(()=>{
    const hasSpecific=selectedCategories.some(x=>x!=='all');
    if(!hasSpecific)return new Set(nodes.map(n=>n.id));
    const s=new Set(selectedCategories);
    return new Set(nodes.filter(n=>s.has(n.category)).map(n=>n.id));
  },[nodes,selectedCategories]);

  const visibleNodes=useMemo(()=>nodes.filter(n=>visibleIds.has(n.id)),[nodes,visibleIds]);
  const visibleEdges=useMemo(()=>edges.filter(e=>visibleIds.has(e.source)&&visibleIds.has(e.target)),[edges,visibleIds]);

  const handleNodeClick=useCallback((node)=>{
    setSelectedNode(node);setNoteOpen(true);
  },[]);

  const handleCreateEdge=useCallback((sourceId,targetId)=>{
    const key=edgeKey(sourceId,targetId);
    const exists=edges.some(e=>edgeKey(e.source,e.target)===key);
    if(exists)return;
    const newEdge={id:'e'+Date.now(),source:sourceId,target:targetId};
    setEdges(prev=>[...prev,newEdge]);
    setTimeout(()=>Graph.triggerEdgeAnim&&Graph.triggerEdgeAnim(newEdge.id),30);
  },[edges]);

  // Called when user taps/clicks an edge
  const handleDeleteEdgeRequest=useCallback((edge)=>{
    setDeleteEdgeTarget(edge);
  },[]);

  const confirmDeleteEdge=useCallback(()=>{
    if(!deleteEdgeTarget)return;
    setEdges(prev=>prev.filter(e=>e.id!==deleteEdgeTarget.id));
    setDeleteEdgeTarget(null);
  },[deleteEdgeTarget]);

  const handleDeleteNode=useCallback(()=>{
    if(!selectedNode)return;
    setNodes(prev=>prev.filter(n=>n.id!==selectedNode.id));
    setEdges(prev=>prev.filter(e=>e.source!==selectedNode.id&&e.target!==selectedNode.id));
    setNoteOpen(false);setSelectedNode(null);
  },[selectedNode]);

  const handleEditOpen=useCallback(()=>{
    if(!selectedNode)return;
    setEditForm({title:selectedNode.title,text:selectedNode.text,category:selectedNode.category,date:selectedNode.date||''});
    setEditOpen(true);setNoteOpen(false);
  },[selectedNode]);

  const handleEditSave=useCallback(()=>{
    if(!editForm.title.trim())return;
    setNodes(prev=>prev.map(n=>n.id===selectedNode.id?{...n,...editForm}:n));
    setSelectedNode(prev=>({...prev,...editForm}));
    setEditOpen(false);setNoteOpen(true);
  },[editForm,selectedNode]);

  const handleAddNote=useCallback(()=>{
    if(!noteForm.title.trim())return;
    const newNode={id:'n'+Date.now(),...noteForm};
    setNodes(prev=>[...prev,newNode]);
    setNoteForm({title:'',text:'',category:categories[0]?.id||'work',date:''});
    setAddNoteOpen(false);
  },[noteForm,categories]);

  const handleAddCategory=useCallback(()=>{
    if(!newCatName.trim())return;
    const newCat={id:'cat'+Date.now(),label:newCatName.trim(),color:newCatColor};
    setCategories(prev=>[...prev,newCat]);
    setNewCatName('');setNewCatColor(PRESET_COLORS[0]);setAddCatOpen(false);
  },[newCatName,newCatColor]);

  const catOf=useCallback((id)=>categories.find(c=>c.id===id),[categories]);

  // Derive node names for the delete-edge dialog
  const edgeNodeNames=useMemo(()=>{
    if(!deleteEdgeTarget)return{a:'',b:''};
    const a=nodes.find(n=>n.id===deleteEdgeTarget.source);
    const b=nodes.find(n=>n.id===deleteEdgeTarget.target);
    return{a:a?.title||'',b:b?.title||''};
  },[deleteEdgeTarget,nodes]);

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100%',background:'#0f0f11'}}>
      <div style={{padding:'12px 16px 8px',borderBottom:'1px solid #1a1a22',flexShrink:0}}>
        <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4,scrollbarWidth:'none'}}>
          <button
            className="chip chip-all"
            style={selectedCategories.includes('all')?{background:'#e2e2e2',color:'#111',borderColor:'#e2e2e2'}:{}}
            onClick={()=>toggleCategory('all')}
          >Все</button>
          {categories.map(cat=>(
            <Chip
              key={cat.id}
              label={cat.label}
              color={cat.color}
              active={selectedCategories.includes(cat.id)}
              onClick={()=>toggleCategory(cat.id)}
            />
          ))}
          <button className="chip chip-add" onClick={()=>setAddCatOpen(true)}>+</button>
        </div>
      </div>

      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        <Graph
          nodes={visibleNodes}
          edges={visibleEdges}
          categories={categories}
          onNodeClick={handleNodeClick}
          onCreateEdge={handleCreateEdge}
          onDeleteEdge={handleDeleteEdgeRequest}
        />
        <div className="connect-hint">Удерживай узел для создания связи · Нажми на линию для удаления</div>
        <button className="fab" onClick={()=>setAddNoteOpen(true)} title="Добавить заметку">+</button>
      </div>

      {/* Delete edge confirmation */}
      {deleteEdgeTarget&&(
        <div className="sheet-overlay" onClick={e=>{if(e.target===e.currentTarget)setDeleteEdgeTarget(null);}}>
          <div className="sheet">
            <div className="sheet-handle"/>
            <h3 style={{marginBottom:10}}>Удалить связь?</h3>
            <p style={{color:'#888',fontSize:13,marginBottom:20,lineHeight:1.5}}>
              Связь между <span style={{color:'#e2e2e2',fontWeight:500}}>«{edgeNodeNames.a}»</span> и <span style={{color:'#e2e2e2',fontWeight:500}}>«{edgeNodeNames.b}»</span> будет удалена.
            </p>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setDeleteEdgeTarget(null)}>Отмена</button>
              <button className="btn btn-danger" style={{flex:1}} onClick={confirmDeleteEdge}>Удалить</button>
            </div>
          </div>
        </div>
      )}

      {noteOpen&&selectedNode&&(
        <div className="sheet-overlay" onClick={e=>{if(e.target===e.currentTarget)setNoteOpen(false);}}>
          <div className="sheet" style={{maxHeight:'80vh',overflowY:'auto'}}>
            <div className="sheet-handle"/>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
              <span style={{fontSize:18,fontWeight:600,flex:1}}>{selectedNode.title}</span>
              {catOf(selectedNode.category)&&(
                <span className="tag-badge" style={{background:catOf(selectedNode.category).color+'22',color:catOf(selectedNode.category).color}}>
                  {catOf(selectedNode.category).label}
                </span>
              )}
            </div>
            {selectedNode.date&&<div style={{color:'#666',fontSize:12,marginBottom:10}}>{selectedNode.date}</div>}
            <p style={{color:'#aaa',fontSize:14,lineHeight:1.6,marginBottom:20}}>{selectedNode.text}</p>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" style={{flex:1}} onClick={handleEditOpen}>Редактировать</button>
              <button className="btn btn-danger" onClick={handleDeleteNode}>Удалить</button>
            </div>
          </div>
        </div>
      )}

      {editOpen&&(
        <div className="sheet-overlay" onClick={e=>{if(e.target===e.currentTarget)setEditOpen(false);}}>
          <div className="sheet">
            <div className="sheet-handle"/>
            <h3 style={{marginBottom:16}}>Редактировать</h3>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <input className="input" placeholder="Заголовок" value={editForm.title} onChange={e=>setEditForm(p=>({...p,title:e.target.value}))}/>
              <textarea className="input" rows={3} placeholder="Текст заметки" value={editForm.text} onChange={e=>setEditForm(p=>({...p,text:e.target.value}))} style={{resize:'none'}}/>
              <select className="input" value={editForm.category} onChange={e=>setEditForm(p=>({...p,category:e.target.value}))}>
                {categories.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
              <input className="input" type="date" value={editForm.date} onChange={e=>setEditForm(p=>({...p,date:e.target.value}))}/>
              <div style={{display:'flex',gap:10}}>
                <button className="btn btn-ghost" style={{flex:1}} onClick={()=>{setEditOpen(false);setNoteOpen(true);}}>Отмена</button>
                <button className="btn btn-primary" style={{flex:1}} onClick={handleEditSave}>Сохранить</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {addNoteOpen&&(
        <div className="sheet-overlay" onClick={e=>{if(e.target===e.currentTarget)setAddNoteOpen(false);}}>
          <div className="sheet">
            <div className="sheet-handle"/>
            <h3 style={{marginBottom:16}}>Новая заметка</h3>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <input className="input" placeholder="Заголовок" value={noteForm.title} onChange={e=>setNoteForm(p=>({...p,title:e.target.value}))}/>
              <textarea className="input" rows={3} placeholder="Текст заметки" value={noteForm.text} onChange={e=>setNoteForm(p=>({...p,text:e.target.value}))} style={{resize:'none'}}/>
              <select className="input" value={noteForm.category} onChange={e=>setNoteForm(p=>({...p,category:e.target.value}))}>
                {categories.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
              <input className="input" type="date" value={noteForm.date} onChange={e=>setNoteForm(p=>({...p,date:e.target.value}))}/>
              <div style={{display:'flex',gap:10}}>
                <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setAddNoteOpen(false)}>Отмена</button>
                <button className="btn btn-primary" style={{flex:1}} onClick={handleAddNote}>Добавить</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {addCatOpen&&(
        <div className="sheet-overlay" onClick={e=>{if(e.target===e.currentTarget)setAddCatOpen(false);}}>
          <div className="sheet">
            <div className="sheet-handle"/>
            <h3 style={{marginBottom:16}}>Новая категория</h3>
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <input className="input" placeholder="Название категории" value={newCatName} onChange={e=>setNewCatName(e.target.value)}/>
              <div>
                <div style={{fontSize:13,color:'#666',marginBottom:8}}>Цвет</div>
                <div style={{display:'flex',gap:10}}>
                  {PRESET_COLORS.map(c=>(
                    <button key={c} className={`color-dot${newCatColor===c?' selected':''}`} style={{background:c,border:`2px solid ${newCatColor===c?'#fff':'transparent'}`}} onClick={()=>setNewCatColor(c)}/>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',gap:10}}>
                <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setAddCatOpen(false)}>Отмена</button>
                <button className="btn btn-primary" style={{flex:1}} onClick={handleAddCategory}>Создать</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
